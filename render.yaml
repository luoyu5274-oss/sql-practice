services:
  - type: web
    name: sql-practice-104k
    env: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend && npm install && VITE_API_URL=/api npx vite build && cp -r dist/* ../backend/static/
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
